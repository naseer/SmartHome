# masn home-server stack -- /opt/stack/docker-compose.yml
# Phase 0 (tomorrow): homeassistant + mosquitto + postgres come up clean.
# frigate / zigbee2mqtt / snapserver are scaffolded but COMMENTED -- enable as hardware arrives.
#
# Network model: HA is network_mode host (needs mDNS/SSDP). mosquitto + postgres publish ONLY to
# 127.0.0.1 so host-mode HA can reach them on localhost, without exposing them on the LAN.
# Bridged services (z2m) reach mosquitto by service name (mosquitto:1883) on the compose network.

services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    network_mode: host              # mDNS/SSDP device discovery
    # --- ENABLE WHEN THE ZBT-2 THREAD DONGLE ARRIVES ---
    # privileged: true              # simplest path for radios + Bluetooth; tighten later
    # devices:                      # stable by-id path, never ttyACM*
    #   - /dev/serial/by-id/usb-...ZBT2-thread...:/dev/ttyThread   # Thread (OTBR/HA)
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./homeassistant/config:/config
      - /run/dbus:/run/dbus:ro
    depends_on: [mosquitto, postgres]

  mosquitto:
    container_name: mosquitto
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "127.0.0.1:1883:1883"       # localhost only (host-mode HA reaches it here)
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  postgres:
    container_name: postgres
    image: postgres:16
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"       # localhost only (host-mode HA recorder reaches it here)
    environment:
      POSTGRES_DB: homeassistant
      POSTGRES_USER: "${PG_USER}"
      POSTGRES_PASSWORD: "${PG_PASSWORD}"
    volumes:
      - postgres:/var/lib/postgresql/data

