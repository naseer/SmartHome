# Frigate -- Phase 3 (cameras). OpenVINO detect on the HD 630 iGPU; recordings -> NAS.
# Verify model paths against the Frigate version's docs when you enable it.

mqtt:
  host: 127.0.0.1
  port: 1883
  user: CHANGE_ME_MQTT_USER
  password: CHANGE_ME_MQTT_PASSWORD

detectors:
  ov:
    type: openvino
    device: GPU                 # HD 630 iGPU via /dev/dri

ffmpeg:
  hwaccel_args: preset-vaapi    # HD 630 VAAPI decode

record:
  enabled: true
  retain:
    days: 15                    # continuous retention (matches plan)
    mode: all
  alerts:
    retain: { days: 30 }
  detections:
    retain: { days: 30 }

snapshots:
  enabled: true
  retain: { default: 30 }

# go2rtc restream -- REQUIRED for Reolink (one connection re-shared to detect/record/live)
go2rtc:
  streams: {}
    # front_door:
    #   - rtsp://USER:PASS@CAM_IP:554/h264Preview_01_main

cameras: {}
